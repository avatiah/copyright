<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: serif; padding: 40px; border: 5px double #333; }
        .hash { font-family: monospace; background: #eee; padding: 5px; font-size: 10pt; }
        .sig { max-width: 150px; }
    </style>
</head>
<body>
    <h1>Certificate of Authenticity</h1>
    <p>Owner: <strong>{{ OWNER_NAME }}</strong></p>
    <p>File: {{ ASSET_TITLE }}</p>
    <p><strong>SHA-256 Digital Fingerprint:</strong></p>
    <div class="hash">{{ HASH }}</div>
    <p>Date: {{ DATE }}</p>
    <hr>
    <img src="signature.png" class="sig"><br>
    Verified Digital Signature
</body>
</html>

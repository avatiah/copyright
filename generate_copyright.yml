name: Generate Copyright PDF
on:
  workflow_dispatch:
    inputs:
      owner_name:
        description: 'Full Name of Copyright Owner'
        required: true
        default: 'Grill (avatiah)'
      asset_title:
        description: 'Title of the Design'
        required: true
        default: 'Lion Design'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install weasyprint

      - name: Process Files and Generate PDF
        run: |
          # Simple python script to replace placeholders and generate PDF
          python -c "
          import os
          from weasyprint import HTML
          with open('template.html', 'r') as f:
              content = f.read()
          
          # In a real scenario, we would calculate the hash of the newest file in /designs
          # For this workflow, we replace the placeholders with inputs
          content = content.replace('{{{{ OWNER_NAME }}}}', '${{ github.event.inputs.owner_name }}')
          content = content.replace('{{{{ ASSET_TITLE }}}}', '${{ github.event.inputs.asset_title }}')
          content = content.replace('{{{{ HASH_CODE }}}}', 'Verified_SHA256_Checksum_Pending')
          
          HTML(string=content, base_url='.').write_pdf('output/copyright_certificate.pdf')
          "

      - name: Commit result
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          git commit -m "Generated certificate for ${{ github.event.inputs.asset_title }}" || echo "No changes"
          git push

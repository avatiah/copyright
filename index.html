<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор Авторских Сертификатов</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; padding: 20px; gap: 20px; }
        .form-container { background: white; padding: 20px; border-radius: 8px; width: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .preview-container { background: white; padding: 40px; border-radius: 4px; flex-grow: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        #certificate-area { border: 5px double #333; padding: 30px; min-height: 600px; position: relative; }
        .hash-box { font-family: monospace; background: #eee; padding: 10px; word-break: break-all; font-size: 11px; }
        .sig-preview { max-width: 150px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Данные сертификата</h2>
    <input type="text" id="ownerName" placeholder="Имя правообладателя" oninput="update()">
    <input type="text" id="artTitle" placeholder="Название работы" oninput="update()">
    
    <label>Изображение (для SHA-256):</label>
    <input type="file" id="artFile" onchange="calculateHash(this)">
    
    <label>Ваша подпись (PNG):</label>
    <input type="file" id="sigFile" onchange="loadSignature(this)">
    
    <button onclick="downloadPDF()" style="background: #27ae60; color: white; border: none; cursor: pointer;">Создать и Скачать PDF</button>
</div>

<div class="preview-container">
    <div id="certificate-area">
        <h1 style="text-align: center; text-transform: uppercase;">Certificate of Authenticity</h1>
        <p>Настоящим подтверждается, что автор:</p>
        <h3 id="viewOwner">[ИМЯ ВЛАДЕЛЬЦА]</h3>
        <p>является владельцем прав на интеллектуальную собственность:</p>
        <h3 id="viewTitle">[НАЗВАНИЕ РАБОТЫ]</h3>
        
        <p><strong>Цифровой отпечаток (SHA-256):</strong></p>
        <div class="hash-box" id="viewHash">Выберите файл для расчета хэша...</div>
        
        <p>Дата регистрации: <span id="viewDate"></span></p>
        
        <div style="margin-top: 50px;">
            <img id="viewSig" class="sig-preview" src="" style="display:none;">
            <div style="border-top: 1px solid #000; width: 200px; margin-top: 5px;">Подпись автора</div>
        </div>
    </div>
</div>

<script>
    document.getElementById('viewDate').innerText = new Date().toLocaleDateString();

    function update() {
        document.getElementById('viewOwner').innerText = document.getElementById('ownerName').value || '[ИМЯ ВЛАДЕЛЬЦА]';
        document.getElementById('viewTitle').innerText = document.getElementById('artTitle').value || '[НАЗВАНИЕ РАБОТЫ]';
    }

    async function calculateHash(input) {
        const file = input.files[0];
        const buffer = await file.arrayBuffer();
        const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        document.getElementById('viewHash').innerText = hashHex;
    }

    function loadSignature(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('viewSig');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function downloadPDF() {
        const element = document.getElementById('certificate-area');
        html2pdf().from(element).save('certificate.pdf');
    }
</script>

</body>
</html>

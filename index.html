<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Copyright Certificate Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --panel-bg: #2c3e50; --accent: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; background: #525659; height: 100vh; overflow: hidden; }

        .admin-panel { 
            width: 380px; background: var(--panel-bg); color: white; padding: 25px; 
            display: flex; flex-direction: column; gap: 15px; box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            z-index: 100; overflow-y: auto;
        }
        .admin-panel h2 { margin: 0 0 10px 0; font-size: 1.2rem; border-bottom: 1px solid #455d7a; padding-bottom: 10px; }
        
        .field-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.7rem; text-transform: uppercase; color: #bdc3c7; }
        input { padding: 10px; border-radius: 4px; border: none; background: #34495e; color: white; }
        
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-pdf { background: var(--accent); color: white; margin-top: 10px; }
        .btn-pdf:hover { background: #2ecc71; }
        .btn-link { background: #2980b9; color: white; }

        .preview-viewport { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 20px; overflow-y: auto; }

        /* A4 Контейнер */
        #certificate-render {
            width: 210mm; height: 296mm; /* Уменьшено на 1мм для запаса */
            background: white; padding: 15mm;
            box-sizing: border-box; font-family: 'Times New Roman', serif; 
            position: relative; display: flex; flex-direction: column;
        }

        .main-border { border: 8px double #1a1a1a; height: 100%; padding: 10mm; display: flex; flex-direction: column; box-sizing: border-box; }
        .header { text-align: center; border-bottom: 2px solid #1a1a1a; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { font-size: 38pt; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .cert-content { flex-grow: 1; font-size: 16pt; line-height: 1.6; color: #1a1a1a; }
        .data-line { font-weight: bold; border-bottom: 1px solid #000; display: inline-block; min-width: 200px; padding: 0 5px; }

        .hash-section { background: #f4f4f4; border-left: 5px solid #1a1a1a; padding: 12px; margin-top: 25px; }
        .hash-title { font-size: 10pt; font-weight: bold; margin-bottom: 5px; }
        .hash-value { font-family: 'Courier New', monospace; font-size: 10pt; word-break: break-all; }

        .footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 30px; }
        .signature-area { text-align: center; width: 220px; min-height: 90px; }
        #sig-output { max-height: 80px; max-width: 200px; display: none; margin-bottom: -5px; }
        .sig-line { border-top: 2px solid #000; padding-top: 5px; font-weight: bold; }

        body.client-view .admin-panel { display: none; }
        body.client-view .preview-viewport { padding: 0; background: white; }
    </style>
</head>
<body id="b">

<div class="admin-panel">
    <h2>Настройки</h2>
    <div class="field-group">
        <label>ID</label>
        <input type="text" id="inID" placeholder="2026-NFT-01" oninput="sync()">
    </div>
    <div class="field-group">
        <label>Владелец</label>
        <input type="text" id="inName" placeholder="Grill (avatiah)" oninput="sync()">
    </div>
    <div class="field-group">
        <label>Работа</label>
        <input type="text" id="inTitle" placeholder="Golden Lion" oninput="sync()">
    </div>
    <div class="field-group">
        <label>Файл для Хеша</label>
        <input type="file" onchange="makeHash(this)">
    </div>
    <div class="field-group">
        <label>Подпись (PNG)</label>
        <input type="file" onchange="makeSig(this)">
    </div>

    <button class="btn-pdf" onclick="generatePDF()">СКАЧАТЬ PDF</button>
    <button class="btn-link" onclick="copyLink()">ССЫЛКА ПРЕДОСМОТРА</button>
</div>

<div class="preview-viewport">
    <div id="certificate-render">
        <div class="main-border">
            <div class="header">
                <h1>CERTIFICATE</h1>
                <p style="letter-spacing: 10px; font-size: 12pt; margin: 5px 0 0;">OF AUTHENTICITY</p>
            </div>
            <div class="cert-content">
                <p>Registration No: <span id="outID" class="data-line">PENDING</span></p>
                <p>Creative work titled:</p>
                <div id="outTitle" class="data-line" style="font-size: 20pt; font-style: italic;">[WORK TITLE]</div>
                <p>Property of:</p>
                <div id="outName" class="data-line" style="font-size: 20pt;">[PROPRIETOR NAME]</div>
                <p style="margin-top: 20px;">Date: <span id="currDate" style="font-weight: bold;"></span></p>
                <div class="hash-section">
                    <div class="hash-title">SHA-256 DIGITAL FINGERPRINT</div>
                    <div id="outHash" class="hash-value">No file selected</div>
                </div>
            </div>
            <div class="footer">
                <div class="signature-area">
                    <img id="sig-output">
                    <div class="sig-line">Authorized Signature</div>
                </div>
                <div style="text-align: right; font-size: 11pt;">
                    Location: <strong>Israel</strong>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let rawSig = localStorage.getItem('lastSig') || "";
    if(rawSig) {
        const img = document.getElementById('sig-output');
        img.src = rawSig; img.style.display = 'inline-block';
    }

    document.getElementById('currDate').innerText = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});

    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('view')) {
        document.body.classList.add('client-view');
        document.getElementById('outID').innerText = urlParams.get('id');
        document.getElementById('outName').innerText = urlParams.get('name');
        document.getElementById('outTitle').innerText = urlParams.get('title');
        document.getElementById('outHash').innerText = urlParams.get('hash');
    }

    function sync() {
        document.getElementById('outID').innerText = document.getElementById('inID').value || 'PENDING';
        document.getElementById('outName').innerText = document.getElementById('inName').value || '[NAME]';
        document.getElementById('outTitle').innerText = document.getElementById('inTitle').value || '[TITLE]';
    }

    async function makeHash(input) {
        if(!input.files[0]) return;
        const buffer = await input.files[0].arrayBuffer();
        const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        document.getElementById('outHash').innerText = hashHex;
    }

    function makeSig(input) {
        if(!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            rawSig = e.target.result;
            localStorage.setItem('lastSig', rawSig);
            const img = document.getElementById('sig-output');
            img.src = rawSig; img.style.display = 'inline-block';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function generatePDF() {
        const element = document.getElementById('certificate-render');
        const opt = {
            margin: 0,
            filename: 'Certificate.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'avoid' }
        };
        
        html2pdf().set(opt).from(element).toPdf().get('pdf').then(function(pdf) {
            var totalPages = pdf.internal.getNumberOfPages();
            for (var i = totalPages; i > 1; i--) { pdf.deletePage(i); }
        }).save();
    }

    function copyLink() {
        const id = encodeURIComponent(document.getElementById('outID').innerText);
        const name = encodeURIComponent(document.getElementById('outName').innerText);
        const title = encodeURIComponent(document.getElementById('outTitle').innerText);
        const hash = encodeURIComponent(document.getElementById('outHash').innerText);
        const cleanURL = window.location.origin + window.location.pathname + `?view=true&id=${id}&name=${name}&title=${title}&hash=${hash}`;
        navigator.clipboard.writeText(cleanURL);
        alert("Ссылка скопирована!");
    }
</script>
</body>
</html>

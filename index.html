<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate Setup</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 40px; }
        .form-container { max-width: 500px; margin: 0 auto; background: #34495e; padding: 30px; border-radius: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #27ae60; color: white; font-weight: bold; cursor: pointer; }
        .url-box { background: #1a1a1a; padding: 15px; margin-top: 20px; font-family: monospace; font-size: 12px; word-break: break-all; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Certificate Setup</h2>
    <label>ID:</label> <input type="text" id="inID" placeholder="LION-001">
    <label>Owner:</label> <input type="text" id="inName" placeholder="Grill (avatiah)">
    <label>Title:</label> <input type="text" id="inTitle" placeholder="Golden Lion">
    <label>Hash (SHA-256):</label> <input type="text" id="inHash" placeholder="Paste hash here">
    
    <button onclick="generateLink()">GENERATE CUSTOMER LINK</button>
    <div id="urlResult" class="url-box"></div>
</div>

<script>
    function generateLink() {
        const id = encodeURIComponent(document.getElementById('inID').value);
        const owner = encodeURIComponent(document.getElementById('inName').value);
        const title = encodeURIComponent(document.getElementById('inTitle').value);
        const hash = encodeURIComponent(document.getElementById('inHash').value);
        
        // Ссылка будет вести на второй файл view.html
        const baseURL = window.location.href.replace('index.html', 'view.html').split('?')[0];
        if (!baseURL.includes('view.html')) {
            // Если мы в корне гитхаба
            const finalURL = baseURL + 'view.html' + `?id=${id}&owner=${owner}&title=${title}&hash=${hash}`;
            showURL(finalURL);
        } else {
            const finalURL = baseURL + `?id=${id}&owner=${owner}&title=${title}&hash=${hash}`;
            showURL(finalURL);
        }
    }

    function showURL(url) {
        const box = document.getElementById('urlResult');
        box.style.display = 'block';
        box.innerText = url;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Copyright Certificate Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eaedef; margin: 0; display: flex; padding: 20px; gap: 20px; }
        
        /* Меню управления */
        .no-print { 
            width: 350px; background: #2c3e50; color: white; padding: 25px; 
            border-radius: 12px; height: 92vh; position: sticky; top: 20px; overflow-y: auto; 
        }
        .no-print h2 { font-size: 18px; border-bottom: 1px solid #34495e; padding-bottom: 10px; margin-top: 0; }
        .no-print label { display: block; margin-top: 15px; font-size: 11px; color: #bdc3c7; text-transform: uppercase; }
        .no-print input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 4px; border: none; background: #34495e; color: white; box-sizing: border-box; }
        .no-print button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .btn-pdf { background: #27ae60; color: white; }
        .btn-url { background: #2980b9; color: white; }

        /* РЕЖИМ ПРОСМОТРА (VIEW MODE) */
        body.is-view-mode { justify-content: center; background: #525659; }
        body.is-view-mode .no-print { display: none !important; }
        body.is-view-mode #cert-page { box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        /* Сертификат A4 */
        #cert-page {
            width: 210mm;
            height: 295mm;
            background: white;
            padding: 15mm;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .border-main { border: 5px double #1a1a1a; height: 100%; padding: 10mm; box-sizing: border-box; display: flex; flex-direction: column; }
        .header { text-align: center; border-bottom: 2px solid #1a1a1a; padding-bottom: 15px; margin-bottom: 30px; }
        .header h1 { font-size: 34pt; margin: 0; text-transform: uppercase; }
        
        .content { flex-grow: 1; font-size: 16pt; line-height: 1.7; color: #1a1a1a; }
        .field { font-weight: bold; border-bottom: 1px solid #333; display: inline-block; min-width: 250px; padding: 0 5px; }

        .hash-box { margin: 25px 0; padding: 15px; background: #f9f9f9; border-left: 5px solid #000; }
        .hash-val { font-family: monospace; font-size: 10.5pt; word-break: break-all; }

        .footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 30px; }
        .sig-box { text-align: center; width: 220px; }
        .sig-img { max-height: 70px; display: none; margin-bottom: -5px; }
        .sig-line { border-top: 2px solid #000; padding-top: 5px; font-weight: bold; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; display: block; }
            #cert-page { box-shadow: none; margin: 0; border: none; width: 210mm; height: 297mm; }
        }
    </style>
</head>
<body id="mainBody">

<div class="no-print">
    <h2>Certificate Setup</h2>
    
    <label>ID</label>
    <input type="text" id="inID" placeholder="LION-001" oninput="sync()">
    <label>Owner</label>
    <input type="text" id="inName" placeholder="Grill (avatiah)" oninput="sync()">
    <label>Title</label>
    <input type="text" id="inTitle" placeholder="Golden Lion" oninput="sync()">
    <label>Work File (Hash)</label>
    <input type="file" id="inArt" onchange="calcHash(this)">
    <label>Signature (PNG)</label>
    <input type="file" id="inSig" onchange="loadSig(this)">

    <button class="btn-pdf" onclick="savePDF()">DOWNLOAD PDF</button>
    <button class="btn-url" onclick="getPreviewURL()">GET PREVIEW URL</button>
</div>

<div id="cert-page">
    <div class="border-main">
        <div class="header">
            <h1>CERTIFICATE</h1>
            <p style="letter-spacing: 5px; margin: 5px 0 0;">OF AUTHENTICITY</p>
        </div>
        <div class="content">
            <p>Registration Number: <span id="outID" class="field">PENDING</span></p>
            <p>Creative work titled:</p>
            <div id="outTitle" class="field" style="font-size: 20pt; font-style: italic;">[ASSET TITLE]</div>
            <p>Exclusive property of:</p>
            <div id="outName" class="field" style="font-size: 20pt;">[PROPRIETOR NAME]</div>
            <p style="margin-top: 25px;">Date: <strong id="outDate"></strong></p>
            <div class="hash-box">
                <div style="font-size: 10pt; font-weight: bold;">SHA-256 HASH</div>
                <div id="outHash" class="hash-val">Waiting for file...</div>
            </div>
        </div>
        <div class="footer">
            <div class="sig-box">
                <img id="outSig" class="sig-img">
                <div class="sig-line">Authorized Signature</div>
            </div>
            <div style="text-align: right;">Location: <strong>Israel</strong></div>
        </div>
    </div>
</div>

<script>
    let signatureBase64 = "";
    document.getElementById('outDate').innerText = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});

    // ПРОВЕРКА: Если в URL есть данные, включаем режим просмотра
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('view') === 'true') {
        document.body.classList.add('is-view-mode');
        document.getElementById('outID').innerText = urlParams.get('id');
        document.getElementById('outName').innerText = urlParams.get('name');
        document.getElementById('outTitle').innerText = urlParams.get('title');
        document.getElementById('outHash').innerText = urlParams.get('hash');
        if(urlParams.get('sig')) {
            const img = document.getElementById('outSig');
            img.src = decodeURIComponent(urlParams.get('sig'));
            img.style.display = 'inline-block';
        }
    }

    function sync() {
        document.getElementById('outID').innerText = document.getElementById('inID').value || 'PENDING';
        document.getElementById('outName').innerText = document.getElementById('inName').value || '[PROPRIETOR NAME]';
        document.getElementById('outTitle').innerText = document.getElementById('inTitle').value || '[ASSET TITLE]';
    }

    async function calcHash(input) {
        if(!input.files[0]) return;
        const buffer = await input.files[0].arrayBuffer();
        const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        document.getElementById('outHash').innerText = hashHex;
    }

    function loadSig(input) {
        if(!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            signatureBase64 = e.target.result;
            const img = document.getElementById('outSig');
            img.src = signatureBase64;
            img.style.display = 'inline-block';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function getPreviewURL() {
        const id = encodeURIComponent(document.getElementById('outID').innerText);
        const name = encodeURIComponent(document.getElementById('outName').innerText);
        const title = encodeURIComponent(document.getElementById('outTitle').innerText);
        const hash = encodeURIComponent(document.getElementById('outHash').innerText);
        const sig = encodeURIComponent(signatureBase64);

        const fullURL = window.location.origin + window.location.pathname + 
                        `?view=true&id=${id}&name=${name}&title=${title}&hash=${hash}&sig=${sig}`;
        
        prompt("Copy this URL for the client:", fullURL);
    }

    function savePDF() {
        const element = document.getElementById('cert-page');
        const opt = {
            margin: 0,
            filename: 'Certificate.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        // Принудительно генерируем только одну страницу
        html2pdf().set(opt).from(element).toPdf().get('pdf').then(function(pdf) {
            const totalPages = pdf.internal.getNumberOfPages();
            for (let i = totalPages; i > 1; i--) {
                pdf.deletePage(i);
            }
        }).save();
    }
</script>
</body>
</html>

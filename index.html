<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate of Authenticity</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Общие стили */
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; }
        
        /* Стили для режима редактирования (скрываются при просмотре по ссылке) */
        .admin-panel { width: 300px; background: #2c3e50; color: white; padding: 20px; height: 100vh; position: fixed; left: 0; top: 0; overflow-y: auto; z-index: 100; }
        .admin-panel input, .admin-panel button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: none; }
        .admin-panel button { background: #27ae60; color: white; font-weight: bold; cursor: pointer; }

        /* СКРЫТИЕ МЕНЮ, если открыто по ссылке (параметр ?view=1) */
        body.view-mode .admin-panel { display: none; }
        body.view-mode { background: white; }

        /* СТИЛИ ДЛЯ ПЕЧАТИ (Ctrl+P) */
        @media print {
            .admin-panel, .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; }
            #cert-container { 
                box-shadow: none !important; 
                border: none !important;
                width: 210mm !important;
                height: 297mm !important;
                transform: scale(1) !important;
                margin: 0 !important;
            }
        }

        /* Контейнер сертификата A4 */
        #cert-container {
            width: 210mm;
            height: 297mm;
            background: white;
            padding: 15mm;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            margin: 20px;
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
        }

        .border-frame { border: 5px double #1a1a1a; height: 100%; padding: 10mm; box-sizing: border-box; display: flex; flex-direction: column; }
        .header { text-align: center; border-bottom: 2px solid #1a1a1a; padding-bottom: 20px; margin-bottom: 40px; }
        .header h1 { font-size: 36pt; margin: 0; text-transform: uppercase; }
        
        .content { flex-grow: 1; font-size: 16pt; line-height: 1.8; }
        .field { font-weight: bold; border-bottom: 1px solid #333; display: inline-block; min-width: 250px; padding: 0 5px; }

        .hash-box { margin: 30px 0; padding: 15px; background: #f9f9f9; border-left: 5px solid #1a1a1a; }
        .hash-val { font-family: monospace; font-size: 11pt; word-break: break-all; }

        .footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 40px; }
        .sig-block { text-align: center; width: 220px; }
        .sig-img { max-height: 80px; display: none; margin-bottom: -10px; }
        .sig-line { border-top: 2px solid #000; padding-top: 5px; font-weight: bold; }
    </style>
</head>
<body id="mainBody">

<div class="admin-panel">
    <h3>Setup Certificate</h3>
    <input type="text" id="inID" placeholder="ID (e.g. LION-001)" oninput="sync()">
    <input type="text" id="inName" placeholder="Owner Name" oninput="sync()">
    <input type="text" id="inTitle" placeholder="Design Title" oninput="sync()">
    <input type="file" id="inArt" onchange="calcHash(this)">
    <input type="file" id="inSig" onchange="loadSig(this)">
    
    <button onclick="window.print()">PRINT / SAVE PDF</button>
    <button style="background: #2980b9;" onclick="copyViewURL()">COPY DIRECT URL</button>
</div>

<div id="cert-container">
    <div class="border-frame">
        <div class="header">
            <h1>CERTIFICATE</h1>
            <p style="letter-spacing: 5px; margin: 5px 0 0;">OF AUTHENTICITY</p>
        </div>

        <div class="content">
            <p>Registration No: <span id="outID" class="field">PENDING</span></p>
            <p>This certifies that the original design titled:</p>
            <div id="outTitle" class="field" style="font-size: 20pt; font-style: italic;">[ASSET TITLE]</div>
            <p>is the exclusive property of:</p>
            <div id="outName" class="field" style="font-size: 20pt;">[PROPRIETOR NAME]</div>
            <p style="margin-top: 30px;">Date: <strong id="outDate"></strong></p>

            <div class="hash-box">
                <div style="font-size: 10pt; font-weight: bold; margin-bottom: 5px;">SHA-256 DIGITAL FINGERPRINT:</div>
                <div id="outHash" class="hash-val">Verification required...</div>
            </div>
        </div>

        <div class="footer">
            <div class="sig-block">
                <img id="outSig" class="sig-img">
                <div class="sig-line">Authorized Signature</div>
            </div>
            <div style="text-align: right;">Location: <strong>Israel</strong></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('outDate').innerText = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});

    // Проверка URL: если есть ?view=1, скрываем меню
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('view') === '1') {
        document.getElementById('mainBody').classList.add('view-mode');
        document.getElementById('outID').innerText = urlParams.get('id');
        document.getElementById('outName').innerText = urlParams.get('owner');
        document.getElementById('outTitle').innerText = urlParams.get('title');
        document.getElementById('outHash').innerText = urlParams.get('hash');
    }

    function sync() {
        document.getElementById('outID').innerText = document.getElementById('inID').value || 'PENDING';
        document.getElementById('outName').innerText = document.getElementById('inName').value || '[PROPRIETOR NAME]';
        document.getElementById('outTitle').innerText = document.getElementById('inTitle').value || '[ASSET TITLE]';
    }

    async function calcHash(input) {
        const buffer = await input.files[0].arrayBuffer();
        const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
        document.getElementById('outHash').innerText = hashHex;
    }

    function loadSig(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('outSig');
            img.src = e.target.result;
            img.style.display = 'inline-block';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function copyViewURL() {
        const id = document.getElementById('inID').value;
        const owner = document.getElementById('inName').value;
        const title = document.getElementById('inTitle').value;
        const hash = document.getElementById('outHash').innerText;
        
        const url = new URL(window.location.href.split('?')[0]);
        url.searchParams.set('view', '1');
        url.searchParams.set('id', id);
        url.searchParams.set('owner', owner);
        url.searchParams.set('title', title);
        url.searchParams.set('hash', hash);
        
        prompt("Direct Link to Certificate (Menu Hidden):", url.href);
    }
</script>
</body>
</html>

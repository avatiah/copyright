<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate of Authenticity</title>
    <style>
        body { margin: 0; padding: 0; background: #525659; display: flex; justify-content: center; }
        
        /* Стили для печати */
        @media print {
            body { background: white; }
            #cert { box-shadow: none !important; border: none !important; margin: 0 !important; }
            .no-print { display: none; }
        }

        #cert {
            width: 210mm;
            height: 297mm;
            background: white;
            padding: 20mm;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: 20px;
            font-family: 'Times New Roman', serif;
            position: relative;
        }

        .border { border: 5px double #1a1a1a; height: 100%; padding: 15mm; box-sizing: border-box; display: flex; flex-direction: column; }
        .header { text-align: center; border-bottom: 2px solid #1a1a1a; padding-bottom: 20px; margin-bottom: 40px; }
        h1 { font-size: 36pt; margin: 0; }
        
        .content { flex-grow: 1; font-size: 18pt; line-height: 2; }
        .field { font-weight: bold; border-bottom: 1px solid #333; display: inline-block; min-width: 250px; }

        .hash-area { background: #f4f4f4; padding: 15px; margin-top: 30px; border-left: 5px solid #000; }
        .hash-title { font-size: 10pt; font-weight: bold; margin-bottom: 5px; }
        .hash-val { font-family: monospace; font-size: 11pt; word-break: break-all; }

        .footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 50px; }
        .sig-line { border-top: 2px solid #000; width: 200px; text-align: center; font-weight: bold; padding-top: 5px; }
    </style>
</head>
<body>

<div id="cert">
    <div class="border">
        <div class="header">
            <h1>CERTIFICATE</h1>
            <p style="letter-spacing: 5px;">OF AUTHENTICITY</p>
        </div>

        <div class="content">
            <p>Registration No: <span id="outID" class="field"></span></p>
            <p>This certifies that the design titled:</p>
            <div id="outTitle" class="field" style="font-size: 22pt; font-style: italic;"></div>
            <p>is the exclusive property of:</p>
            <div id="outName" class="field" style="font-size: 22pt;"></div>
            <p>Issued on: <strong id="outDate"></strong></p>

            <div class="hash-area">
                <div class="hash-title">SHA-256 DIGITAL FINGERPRINT</div>
                <div id="outHash" class="hash-val"></div>
            </div>
        </div>

        <div class="footer">
            <div class="sig-line">Authorized Signature</div>
            <div style="text-align: right;">Location: <strong>Israel</strong></div>
        </div>
    </div>
</div>

<button class="no-print" onclick="window.print()" style="position: fixed; top: 20px; right: 20px; padding: 15px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">
    PRINT TO PDF / PAPER
</button>

<script>
    const p = new URLSearchParams(window.location.search);
    document.getElementById('outID').innerText = p.get('id') || '---';
    document.getElementById('outName').innerText = p.get('owner') || '---';
    document.getElementById('outTitle').innerText = p.get('title') || '---';
    document.getElementById('outHash').innerText = p.get('hash') || '---';
    document.getElementById('outDate').innerText = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
</script>
</body>
</html>

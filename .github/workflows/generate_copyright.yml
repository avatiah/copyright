name: Full Copyright Certification
on:
  workflow_dispatch:
    inputs:
      owner_name:
        description: 'Ваше Имя (Правообладатель)'
        required: true
        default: 'Grill (avatiah)'
      image_filename:
        description: 'Имя файла в папке designs (например: lion.jpg)'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install weasyprint

      - name: Calculate Hash and Generate PDF
        run: |
          python -c "
          import hashlib
          import datetime
          from weasyprint import HTML
          
          img_path = 'designs/${{ github.event.inputs.image_filename }}'
          
          # 1. Расчет SHA-256
          with open(img_path, 'rb') as f:
              file_hash = hashlib.sha256(f.read()).hexdigest()
          
          # 2. Подготовка шаблона
          with open('template.html', 'r') as f:
              html = f.read()
          
          html = html.replace('{{ OWNER_NAME }}', '${{ github.event.inputs.owner_name }}')
          html = html.replace('{{ ASSET_TITLE }}', '${{ github.event.inputs.image_filename }}')
          html = html.replace('{{ HASH }}', file_hash)
          html = html.replace('{{ DATE }}', datetime.datetime.now().strftime('%d.%m.%Y'))
          
          # 3. Создание PDF
          HTML(string=html, base_url='.').write_pdf('output/certificate_${{ github.event.inputs.image_filename }}.pdf')
          "

      - name: Save to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Copyright Bot"
          git add output/
          git commit -m "Certificate for ${{ github.event.inputs.image_filename }}"
          git push

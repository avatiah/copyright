<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Certificate Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #161616;
            --border: #2a2a2a;
            --gold: #b8972a;
            --text: #ffffff;
            --muted: #888;
            --danger: #e74c3c;
            --danger-bg: #2a1212;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }

        .auth-box {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-main {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .logo-sub {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            background: #1f1f1f;
            border: 1px solid #2e2e2e;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            background: #252525;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: #111;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-msg {
            background: var(--danger-bg);
            border: 1px solid #5a1a1a;
            color: var(--danger);
            font-size: 12px;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            display: none; /* Скрыто по умолчанию */
        }

        .footer-info {
            margin-top: 24px;
            text-align: center;
            font-size: 11px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="auth-box">
        <div class="logo-area">
            <div class="logo-main">Certificate Pro</div>
            <div class="logo-sub">Authorized Access Only</div>
        </div>

        <div id="error-box" class="error-msg">
            Неверный логин или пароль
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="username">Логин</label>
                <input type="text" id="username" placeholder="admin" autocomplete="username" required>
            </div>
            
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn-login">Войти в систему</button>
        </form>

        <div class="footer-info">
            Secure Connection &bull; TLS Encrypted
        </div>
    </div>
</div>

<script>
    // URL основного приложения. Если ваш файл называется иначе (например, app.html), измените это значение.
    const MAIN_APP_URL = 'index.html'; 

    // Те же креды, что в основном приложении
    const CREDENTIALS = [
        { user: 'admin', pass: 'cert2026' },
        { user: 'grill', pass: 'avatiah' }
    ];

    function handleLogin(e) {
        e.preventDefault();
        
        const userIn = document.getElementById('username').value.trim();
        const passIn = document.getElementById('password').value;
        const errorBox = document.getElementById('error-box');
        const btn = document.querySelector('.btn-login');

        // Простая анимация загрузки
        btn.textContent = 'Проверка...';
        btn.style.opacity = '0.7';

        setTimeout(() => {
            const isValid = CREDENTIALS.some(c => c.user === userIn && c.pass === passIn);

            if (isValid) {
                // Успех: сохраняем сессию и перенаправляем
                sessionStorage.setItem('cert_session', 'true');
                // Очищаем поля ввода для безопасности
                document.getElementById('password').value = '';
                window.location.href = MAIN_APP_URL;
            } else {
                // Ошибка
                errorBox.style.display = 'block';
                btn.textContent = 'Войти в систему';
                btn.style.opacity = '1';
                
                // Тряска формы для визуального эффекта ошибки
                const box = document.querySelector('.auth-box');
                box.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        }, 400); // Имитация задержки сети
    }

    // Проверка: если пользователь уже авторизован, сразу кидаем его внутрь
    if (sessionStorage.getItem('cert_session') === 'true') {
        window.location.href = MAIN_APP_URL;
    }
</script>

</body>
</html>
